# Advanced CodeQL: loads `.github/codeql/codeql-config.yml` via `init` → `config-file`.
#
# REQUIRED (repo Settings): disable GitHub "default setup" for CodeQL while this workflow
# exists, or SARIF upload fails with:
#   "CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled"
# Settings → Code security → Code scanning → CodeQL analysis → disable default setup.
# https://docs.github.com/en/code-security/code-scanning/managing-your-code-scanning-configuration/editing-your-configuration-of-default-setup
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "24 5 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Linux dependencies (Tauri / Rust build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf curl wget file

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build (src-tauri; traced by CodeQL)
        working-directory: src-tauri
        run: cargo build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
