# Advanced CodeQL: loads `.github/codeql/codeql-config.yml` via `init` → `config-file`.
#
# REQUIRED (repo Settings): disable GitHub "default setup" for CodeQL while this workflow
# exists, or SARIF upload fails with:
#   "CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled"
# Settings → Code security → Code scanning → CodeQL analysis → disable default setup.
# https://docs.github.com/en/code-security/code-scanning/managing-your-code-scanning-configuration/editing-your-configuration-of-default-setup
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "24 5 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.set.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        if: github.event_name != 'schedule'
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
            workflow:
              - '.github/workflows/**'
            codeql:
              - '.github/codeql/**'
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          R="${{ steps.filter.outputs.rust }}"
          W="${{ steps.filter.outputs.workflow }}"
          C="${{ steps.filter.outputs.codeql }}"
          if [ "$R" = "true" ] || [ "$W" = "true" ] || [ "$C" = "true" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (Rust)
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Linux dependencies (Tauri / Rust build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf curl wget file

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build (src-tauri; traced by CodeQL)
        working-directory: src-tauri
        run: cargo build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"

  codeql-success:
    name: CodeQL success
    needs: [changes, analyze]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: none
    steps:
      - name: Verify jobs
        env:
          CHANGES: ${{ needs.changes.result }}
          RUN: ${{ needs.changes.outputs.run }}
          ANALYZE: ${{ needs.analyze.result }}
        run: |
          echo "changes=$CHANGES run=$RUN analyze=$ANALYZE"
          if [ "$CHANGES" != "success" ]; then
            echo "changes job did not succeed."
            exit 1
          fi
          if [ "$RUN" = "true" ]; then
            if [ "$ANALYZE" = "failure" ] || [ "$ANALYZE" = "cancelled" ]; then
              echo "CodeQL analyze did not succeed."
              exit 1
            fi
          fi
