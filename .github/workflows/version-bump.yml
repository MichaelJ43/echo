name: Version bump

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver segment to increase"
        type: choice
        required: true
        default: minor
        options:
          - patch
          - minor
          - major

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write # dispatch Release workflow via REST (workflow_dispatch is allowed for GITHUB_TOKEN)
    steps:
      # Pushes made with GITHUB_TOKEN do not trigger other workflows. We still use a PAT for `git push`
      # so commits/tags appear as a normal user push. The Release workflow is started explicitly via
      # workflow_dispatch (see "Dispatch Release" below)—tag push alone is unreliable for triggering CI.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Use PAT for git push
        env:
          PAT: ${{ secrets.RELEASE_PUSH_TOKEN }}
          PAT_ALT: ${{ secrets.GH_PAT }}
        run: |
          TOKEN="${PAT:-$PAT_ALT}"
          if [ -z "$TOKEN" ]; then
            echo "::error::Add a repository Actions secret named RELEASE_PUSH_TOKEN (recommended) or GH_PAT: a Personal Access Token with Contents: Read and write on this repo. See README (Versioning)."
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - name: Choose bump kind
        id: kind
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in package.json, Cargo.toml, tauri.conf.json, lockfiles
        run: node scripts/bump-version.mjs "${{ steps.kind.outputs.bump }}"

      - name: Commit and tag
        env:
          # Explicit token: bare ${GITHUB_TOKEN} in bash was empty here → curl 401 to workflow dispatch API.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          if [ -f src-tauri/Cargo.lock ]; then git add src-tauri/Cargo.lock; fi
          if git diff --staged --quiet; then
            echo "No version change; exiting."
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          # Do not use [skip ci]: that text skips workflows for this commit, including
          # tag-triggered Release runs (the v* tag points at this commit).
          git commit -m "chore: release v${VERSION}"
          git push origin main
          git tag "v${VERSION}"
          git push origin "refs/tags/v${VERSION}"
          echo "Dispatching Release workflow for v${VERSION}..."
          gh workflow run release.yml --ref main -f tag="v${VERSION}" -R "${GITHUB_REPOSITORY}"
