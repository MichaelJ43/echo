name: Version bump

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver segment to increase"
        type: choice
        required: true
        default: minor
        options:
          - patch
          - minor
          - major

concurrency:
  group: version-bump
  cancel-in-progress: true

jobs:
  bump:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pushes made with the default GITHUB_TOKEN do not trigger other workflows (by GitHub design).
      # The Release workflow must see a real tag push, so we use a PAT for checkout + push.
      - name: Require RELEASE_PUSH_TOKEN
        env:
          PAT: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::Add repository secret RELEASE_PUSH_TOKEN (fine-grained PAT: Contents Read/Write on this repo, or classic PAT with repo scope). Without it, tag pushes from this job never trigger the Release workflow."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - name: Choose bump kind
        id: kind
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in package.json, Cargo.toml, tauri.conf.json, lockfiles
        run: node scripts/bump-version.mjs "${{ steps.kind.outputs.bump }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          if [ -f src-tauri/Cargo.lock ]; then git add src-tauri/Cargo.lock; fi
          if git diff --staged --quiet; then
            echo "No version change; exiting."
            exit 0
          fi
          VERSION=$(node -p "require('./package.json').version")
          # Do not use [skip ci]: that text skips workflows for this commit, including
          # tag-triggered Release runs (the v* tag points at this commit).
          git commit -m "chore: release v${VERSION}"
          git push origin main
          git tag "v${VERSION}"
          git push origin "refs/tags/v${VERSION}"
