name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Default token permissions (CodeQL: actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      rust: ${{ steps.filter.outputs.rust }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ts:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.node.json'
              - 'index.html'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
              - 'test/e2e/**'
              - 'examples/**'
            rust:
              - 'src-tauri/**'
            workflow:
              - '.github/workflows/**'

  frontend:
    needs: changes
    if: needs.changes.outputs.ts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npm test
      - run: npm run build

  e2e:
    needs: changes
    if: needs.changes.outputs.ts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm install
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          CI: true

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf curl wget file
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

  ci-success:
    name: CI success
    needs: [changes, frontend, rust, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify jobs
        env:
          CHANGES: ${{ needs.changes.result }}
          FRONTEND: ${{ needs.frontend.result }}
          RUST: ${{ needs.rust.result }}
          E2E: ${{ needs.e2e.result }}
        run: |
          echo "changes=$CHANGES frontend=$FRONTEND rust=$RUST e2e=$E2E"
          if [ "$CHANGES" != "success" ]; then
            echo "changes job did not succeed."
            exit 1
          fi
          for r in "$FRONTEND" "$RUST" "$E2E"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A CI job failed or was cancelled."
              exit 1
            fi
          done
