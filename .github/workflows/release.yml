name: Release

# Started by Version bump (workflow_dispatch via API) or manually. Tag push alone does not
# reliably trigger workflows from automated pushes; do not rely on `on.push.tags` for CI-created tags.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.4). Must exist on the repo."
        required: true
        type: string

# One workflow run per tag at a time (avoids overlapping duplicate dispatches).
# Do NOT put concurrency on the matrix job with a tag-only group: each matrix leg
# would share that group, and GitHub only allows one running + one pending job per
# group — the third OS job is cancelled with "higher priority waiting request".
concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf curl wget file

      - run: npm install

      - name: Point updater at this GitHub repo
        run: node scripts/inject-updater-endpoint.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.event.inputs.tag }}
          releaseName: Echo ${{ github.event.inputs.tag }}
